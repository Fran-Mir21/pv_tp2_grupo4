<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const duplicar = (arr) => {
    return arr.map(num => num * 2);
};

let cantidad = parseInt(prompt("¿Cuántos números queres ingresar?"));
let numeros = [];

for (let i = 0; i < cantidad; i++) {
    let num = parseInt(prompt(`Número ${i + 1}:`));
    numeros.push(num);
}

let resultado = duplicar(numeros);

document.write(`Numeros original: ${numeros}<br>`);
document.write(`Numeros duplicado: ${resultado}`);
    </script>
</body>
</html>
