<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 23 - Validación de Longitud</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #0d6efd; }

        .visor {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            min-height: 40px;
            background-color: #e9ecef; /* Color inicial */
            transition: background-color 0.4s ease;
            word-wrap: break-word;
        }

        /* Clase que aplicaremos con JS cuando supere los 20 caracteres */
        .visor-alerta {
            background-color: #ffcccc; /* Rojo claro */
            color: #b02a37;
        }

        .contador {
            font-size: 0.8rem;
            color: #6c757d;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Monitor de Texto</h2>
        <input type="text" id="input-texto" placeholder="Escribe aquí...">
        <div id="contador-chars" class="contador">Caracteres: 0</div>
        
        <div id="contenedor-visor" class="visor">
            <p id="texto-salida">Esperando entrada...</p>
        </div>
    </div>

    <script type="module" src="js/ejercicio23.js"></script>
</body>
</html>
