<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 20 - Captura de Inputs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="formulario">
        <h2>Registro de Estudiante</h2>
        
        <div class="campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Ej: María">
        </div>

        <div class="campo">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" placeholder="Ej: Diaz">
        </div>

        <div class="campo">
            <label for="lu">Libreta Universitaria:</label>
            <input type="text" id="lu" placeholder="Ej: APU999999">
        </div>

        <button id="btn-mostrar">Mostrar Datos</button>
    </div>

    <script type="module" src="js/ejercicio20.js"></script>
</body>
</html>
