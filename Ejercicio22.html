<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 22 - Espejo de Texto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { color: #2c3e50; margin-top: 0; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #4a90e2;
        }
        .display-area {
            background-color: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            min-height: 60px;
            border-left: 5px solid #4a90e2;
        }
        #resultado {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            color: #4a5568;
            word-wrap: break-word;
            font-style: italic;
        }
        .label-text {
            font-size: 0.8rem;
            color: #a0aec0;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Vista en tiempo real</h2>
        <label for="entrada-texto" class="label-text">Escribir:</label>
        <input type="text" id="entrada-texto" placeholder="Tu mensaje se verá abajo...">
        
        <div class="display-area">
            <span class="label-text">Resultado:</span>
            <p id="resultado"></p>
        </div>
    </div>

    <script type="module" src="js/ejercicio22.js"></script>
</body>
</html>
