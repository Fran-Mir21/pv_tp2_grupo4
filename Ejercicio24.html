<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 24 - Botones de Opción</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 20px; }
        
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .opcion-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .resultado-box {
            background-color: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #1a73e8;
        }

        #texto-resultado {
            margin: 0;
            font-weight: bold;
            color: #1a73e8;
        }
        
        .label-resultado {
            font-size: 0.8rem;
            color: #70757a;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Lenguaje preferido</h2>
        
        <div class="opciones">
            <label class="opcion-item">
                <input type="radio" name="lenguaje" value="JavaScript"> JavaScript
            </label>
            <label class="opcion-item">
                <input type="radio" name="lenguaje" value="Python"> Python
            </label>
            <label class="opcion-item">
                <input type="radio" name="lenguaje" value="Java"> Java
            </label>
            <label class="opcion-item">
                <input type="radio" name="lenguaje" value="C++"> C++
            </label>
        </div>

        <div class="resultado-box">
            <span class="label-resultado">Seleccionaste:</span>
            <p id="texto-resultado">Ninguno aún</p>
        </div>
    </div>

    <script type="module" src="js/ejercicio24.js"></script>
</body>
</html>
