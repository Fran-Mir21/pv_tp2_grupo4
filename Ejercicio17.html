<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const contarLetraA = (texto) => {
    let contador = 0;

    for (let i = 0; i < texto.length; i++) {
        if (texto[i].toLowerCase() === "a") {
            contador++;
        }
    }

    return contador;
};

let texto = prompt("Ingresá un texto");
document.write(`La letra "a" aparece ${contarLetraA(texto)} veces`);
    </script>
</body>
</html>
