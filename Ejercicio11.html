<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
</head>
<body>
    <script>
       
       let km=parseFloat(prompt("Ingrese la cantidad de kilómetros recorridos: "));
       let litros=parseFloat(prompt("Ingrese la cantidad de litros consumidos: "));
       let consumo=litros/km;
       document.write(` El consumo de combustible es de ${consumo.toFixed(2)} litros.`);

    </script>
</body>
</html>
