<!DOCTYPE html>
<html lang="en">

</head>
<body>
    <script>
        const calcularMayor = (num1, num2) => {
    if (num1 > num2) {
        return `El mayor es ${num1}`;
    } else if (num2 > num1) {
        return `El mayor es ${num2}`;
    } else {
        return "Ambos números son iguales";
    }
};

let n1 = parseInt(prompt("Ingresá el primer número"));
let n2 = parseInt(prompt("Ingresá el segundo número"));

document.write(calcularMayor(n1, n2));
    </script>
</body>
